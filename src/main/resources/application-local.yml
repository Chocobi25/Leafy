spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379

  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always

management:
  endpoints:
    web:
      exposure:
        include: "prometheus"

  prometheus:
    metrics:
      export:
        enabled: true